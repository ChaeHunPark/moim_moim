version: '3.9'

services:
  db:
    image: mysql:8.0
    env_file:
      - .env.prod
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    env_file:
      - .env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
    expose:
      - "8080"
    depends_on:
      - db

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    volumes:
      - ./nginx/conf.d/default.prod.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    ports:
      - "80:80"
      - "443:443"
    command: >
      sh -c "while :; do
              sleep 6h;
              nginx -s reload;
            done & nginx -g 'daemon off;'"
    depends_on:
      - backend

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: ""
    command: tail -f /dev/null
volumes:
  db_data:
