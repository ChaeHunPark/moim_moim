version: '3.9'

services:
  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    env_file:
      - .env.local
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    env_file:
      - .env.local
    environment:
      SPRING_PROFILES_ACTIVE: local
    ports:
      - "8080:8080"
    depends_on:
      - db

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    volumes:
      - ./nginx/conf.d/default.local.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
